name: Build and Test
description: Build and test ROS packages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

defaults:
  run:
    shell: bash

jobs:
  ci-pixi:
    name: Build and Test (pixi, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, macos-13]
    steps:
    - uses: actions/checkout@v4

    - uses: prefix-dev/setup-pixi@v0.8.8
      with:
        environments: jazzy

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Build and test
      run: just ci

  ci-apt:
    name: Build and Test (apt, ubuntu)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install ROS Jazzy
      run: |
        sudo apt update && sudo apt install -y curl gnupg2 lsb-release
        sudo curl -sSL https://raw.githubusercontent.com/ros/rosdistro/master/ros.key -o /usr/share/keyrings/ros-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/ros-archive-keyring.gpg] http://packages.ros.org/ros2/ubuntu $(. /etc/os-release && echo $UBUNTU_CODENAME) main" | sudo tee /etc/apt/sources.list.d/ros2.list > /dev/null
        sudo apt update
        sudo apt install -y \
          ros-jazzy-ros-base \
          python3-colcon-common-extensions \
          python3-rosdep \
          clang-format \
          ros-jazzy-ament-cpplint \
          ros-jazzy-ament-cppcheck \
          ros-jazzy-ament-flake8 \
          ros-jazzy-ament-pep257

    - name: Initialize rosdep
      run: |
        sudo rosdep init
        rosdep update

    - name: Install dependencies via rosdep
      run: rosdep install --from-paths . --ignore-src -r -y

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Build and test
      run: just ci-apt
