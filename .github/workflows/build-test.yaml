name: Build and Test
description: Build and test ROS packages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

defaults:
  run:
    shell: bash

jobs:
  ci-pixi:
    name: Build and Test (pixi, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
    - uses: actions/checkout@v4

    - uses: prefix-dev/setup-pixi@v0.8.8
      with:
        environments: jazzy

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Build and test
      run: just ci

  ci-system:
    name: Build and Test (system, ubuntu)
    runs-on: ubuntu-latest
    container:
      image: ros:jazzy
    steps:
    - uses: actions/checkout@v4

    - name: Install build tools
      run: |
        apt-get update && apt-get install -y \
          python3-colcon-common-extensions \
          python3-rosdep \
          clang-format \
          clang-tidy \
          pipx
        pipx install ruff
        echo "$(pipx environment --value PIPX_BIN_DIR)" >> $GITHUB_PATH

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Install dependencies
      run: just install-system

    - name: Build and test
      run: just ci-system
